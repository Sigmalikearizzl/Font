<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Master - To-Do List Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>📝 Task Master</h1>
            <p class="subtitle">Organize your tasks and boost productivity</p>
        </header>

        <main class="main-content">
            <!-- Input Section -->
            <div class="input-section">
                <form id="todoForm" class="todo-form">
                    <input
                        type="text"
                        id="todoInput"
                        class="todo-input"
                        placeholder="Add a new task..."
                        maxlength="200"
                        autofocus
                    >
                    <button type="submit" class="btn-add">
                        <span>Add Task</span>
                        <span class="icon">+</span>
                    </button>
                </form>
                <div class="char-counter">
                    <span id="charCount">0</span>/200
                </div>
            </div>

            <!-- Filter & Sort Section -->
            <div class="controls-section">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">
                        All <span class="badge" id="badgeAll">0</span>
                    </button>
                    <button class="filter-btn" data-filter="active">
                        Active <span class="badge" id="badgeActive">0</span>
                    </button>
                    <button class="filter-btn" data-filter="completed">
                        Completed <span class="badge" id="badgeCompleted">0</span>
                    </button>
                </div>

                <div class="sort-buttons">
                    <button class="sort-btn" id="sortByDate" title="Sort by date (newest first)">
                        📅 Date
                    </button>
                    <button class="sort-btn" id="sortByName" title="Sort alphabetically">
                        🔤 Name
                    </button>
                    <button class="sort-btn" id="sortByPriority" title="Sort by priority">
                        ⚡ Priority
                    </button>
                </div>
            </div>

            <!-- Priority Legend -->
            <div class="priority-legend">
                <span class="legend-item">
                    <span class="priority-tag priority-high">High</span>
                </span>
                <span class="legend-item">
                    <span class="priority-tag priority-medium">Medium</span>
                </span>
                <span class="legend-item">
                    <span class="priority-tag priority-low">Low</span>
                </span>
            </div>

            <!-- Tasks List -->
            <section class="tasks-section">
                <div id="todoList" class="todo-list">
                    <!-- Tasks will be rendered here -->
                </div>

                <!-- Empty State -->
                <div id="emptyState" class="empty-state">
                    <div class="empty-icon">📭</div>
                    <h3>No tasks yet</h3>
                    <p>Add your first task to get started!</p>
                </div>

                <!-- All Completed State -->
                <div id="completedState" class="completed-state" style="display: none;">
                    <div class="completed-icon">🎉</div>
                    <h3>All caught up!</h3>
                    <p>You've completed all your tasks. Great job!</p>
                </div>
            </section>

            <!-- Statistics -->
            <div class="stats-section">
                <div class="stat">
                    <div class="stat-value" id="statTotal">0</div>
                    <div class="stat-label">Total Tasks</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statCompleted">0</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="statProgress">0%</div>
                    <div class="stat-label">Progress</div>
                </div>
            </div>

            <!-- Progress Bar -->
            <div class="progress-bar-container">
                <div class="progress-bar" id="progressBar"></div>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button id="clearCompleted" class="btn-secondary">
                    🗑️ Clear Completed
                </button>
                <button id="exportTodos" class="btn-secondary">
                    📥 Export Tasks
                </button>
                <button id="importTodos" class="btn-secondary">
                    📤 Import Tasks
                </button>
                <input type="file" id="importFile" style="display: none;" accept=".json">
                <button id="resetAll" class="btn-danger">
                    ⚠️ Reset All
                </button>
            </div>
        </main>

        <footer class="footer">
            <p>Task Master © 2026 | All tasks are saved locally</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
